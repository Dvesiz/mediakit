<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MediaKit - 纯前端媒体工具箱，图片压缩/转换/编辑、视频音频处理、二维码工坊、颜色萃取，全部在浏览器本地完成">
  <meta name="theme-color" content="#07060f">
  <title>MediaKit - 媒体工具箱</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/src/styles/variables.css">
  <link rel="stylesheet" href="/src/styles/main.css">
  <!-- PWA 支持 -->
  <link rel="manifest" href="/manifest.json">
</head>
<body>
  <!-- 极光渐变背景 -->
  <div class="aurora" aria-hidden="true">
    <span></span><span></span><span></span><span></span>
  </div>

  <div id="app">
    <!-- 顶栏导航 -->
    <header id="header"></header>
    <!-- 主内容区 -->
    <main id="content">
      <section id="tool-home" class="tool-page active">
        <div class="hero">
          <h1>MediaKit</h1>
          <p class="subtitle">纯前端媒体工具箱 · 本地处理 · 隐私安全</p>
          <div class="tool-grid" id="tool-grid"></div>
        </div>
      </section>
      <!-- 各工具页面由路由动态渲染 -->
    </main>
    <!-- 页脚 -->
    <footer id="footer"></footer>
  </div>

  <!-- 回到顶部 -->
  <button id="back-to-top" class="back-to-top" aria-label="回到顶部">↑</button>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
